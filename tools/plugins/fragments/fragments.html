<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fragments Tool</title>
  <link rel="stylesheet" href="fragments.css">
</head>
<body>
  <div class="fragments-container">
    <!-- Left Panel: Fragment Tree -->
    <div class="fragments-panel">
      <div class="panel-header">
        <h2 class="panel-title">Fragments</h2>
      </div>

      <input type="search"
             class="fragment-search"
             placeholder="Enter fragment name"
             role="searchbox"
             aria-label="Search fragments">

      <div class="message-wrapper hidden">
        <div class="feedback-message"></div>
      </div>

      <div class="fragments-list" role="list">
        <div class="loading-state">Loading fragments...</div>
      </div>
    </div>

    <!-- Right Panel: Preview -->
    <div class="preview-panel">
      <div class="preview-panel-content">
        <div class="preview-placeholder">
          <svg class="preview-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <p>Click preview icon to view fragment</p>
        </div>
        <iframe class="preview-iframe hidden" allow="clipboard-write *"></iframe>
      </div>
    </div>
  </div>

  <script type="module" src="fragments.js"></script>
</body>
</html>
