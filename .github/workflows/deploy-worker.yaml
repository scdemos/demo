name: Deploy Worker

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ac7ee4615628005dc5ba0a22f0aae2a6
          workingDirectory: ${{ inputs.working-directory }}
