name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**/*.js'
      - 'workers/**/wrangler.toml'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.changes.outputs.auth }}
      contact_us: ${{ steps.changes.outputs.contact_us }}
      feed: ${{ steps.changes.outputs.feed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: changes
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "auth=$(echo "$changed" | grep -qE '^workers/auth/(.*\.js|wrangler\.toml)$' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "contact_us=$(echo "$changed" | grep -qE '^workers/contact_us/(.*\.js|wrangler\.toml)$' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "feed=$(echo "$changed" | grep -qE '^workers/feed/(.*\.js|wrangler\.toml)$' && echo true || echo false)" >> "$GITHUB_OUTPUT"

  deploy-auth:
    needs: detect
    if: needs.detect.outputs.auth == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ac7ee4615628005dc5ba0a22f0aae2a6
          workingDirectory: workers/auth

  deploy-contact-us:
    needs: detect
    if: needs.detect.outputs.contact_us == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ac7ee4615628005dc5ba0a22f0aae2a6
          workingDirectory: workers/contact_us

  deploy-feed:
    needs: detect
    if: needs.detect.outputs.feed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ac7ee4615628005dc5ba0a22f0aae2a6
          workingDirectory: workers/feed
